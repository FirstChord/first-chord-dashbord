name: Generate Configs

on:
  push:
    paths:
      - 'lib/config/students-registry.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-configs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate derived config files
        run: npm run generate-configs

      - name: Commit generated config updates
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/student-url-mappings.js lib/student-helpers.js lib/soundslice-mappings.js lib/config/theta-credentials.js lib/config/instruments.js
          git commit -m "chore: regenerate dashboard config files"
          git push

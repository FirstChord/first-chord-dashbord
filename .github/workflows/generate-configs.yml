name: Generate Configs

on:
  push:
    paths:
      - 'lib/config/students-registry.js'
  workflow_dispatch:

concurrency:
  group: generate-configs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate-configs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Derived config files are gitignored build artifacts (regenerated at deploy via
      # the `prebuild` hook). This step no longer commits them — it just validates that
      # the canonical registry still generates cleanly after a change.
      - name: Validate config generation
        run: npm run generate-configs
